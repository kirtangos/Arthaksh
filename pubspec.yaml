name: arthaksh
description: A basic Flutter starter app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  fl_chart: ^0.66.2
  vector_math: ^2.1.4
  google_fonts: ^6.2.1
  firebase_core: ^4.0.0
  device_preview: ^1.3.1
  get: ^4.7.2
  firebase_auth: ^6.0.1
  dart_console: ^4.1.2
  cloud_firestore: ^6.0.0
  cloud_firestore_platform_interface: ^7.0.0
  excel: ^4.0.6
  file_saver: ^0.3.1
  path_provider: ^2.1.4
  open_filex: ^4.4.0
  universal_html: ^2.2.1
  confetti: ^0.8.0
  package_info_plus: ^8.0.2
  shared_preferences: any
  flutter_local_notifications: ^19.1.0
  timezone: ^0.10.1
  permission_handler: ^11.3.0
  syncfusion_flutter_charts: ^31.1.17
  provider: ^6.1.1
  collection: ^1.18.0
  logging: ^1.2.0
  flutter_launcher_icons: ^0.14.4
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


# Launcher icon configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image: assets/icons/icon.png
    sizes: 512
  windows:
    generate: true
    image: assets/icons/icon.png
    icon_size: 48
  macos:
    generate: true
    image: assets/icons/icon.png


flutter:
  uses-material-design: true
  assets:
    - assets/icons/
